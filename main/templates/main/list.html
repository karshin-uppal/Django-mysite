{% extends "main/base.html" %}

{% block title %}View List{% endblock %}


{%block content%}
    <h1>{{ ls.name }}</h1>
    <ul>
        {% for item in ls.item_set.all %}
            {% if not item.complete %}
                <li>{{ item.text }} - Incomplete</li>
            {% else %}
                 <li>{{ item.text}} - Complete</li>
            {% endif %}
        {% endfor %}
    </ul>
{% endblock %}
